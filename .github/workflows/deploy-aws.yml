name: Deploy Lambda to AWS (OIDC)

# AT-050 / SA-024: routine Lambda code only. API Gateway, Cognito, and API-key policy
# changes run via deploy-aws-infra.yml (workflow_dispatch).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "lambda/**"
      - ".github/workflows/deploy-aws.yml"

permissions:
  id-token: write
  contents: read
  deployments: write

concurrency:
  group: deploy-aws-lambda-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AWS_REGION: eu-west-1
  LAMBDA_FUNCTION_NAME: aquarium-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    # AT-036 / SA-005: requires the `production` environment with required reviewers
    # (see deploy/github-environments.md).
    environment:
      name: production
      url: https://gnewkvhgwd.execute-api.eu-west-1.amazonaws.com/prod/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: lambda/package-lock.json

      - name: Install Lambda deps
        working-directory: lambda
        run: npm ci

      - name: Bundle Lambda (bundle.js)
        working-directory: lambda
        run: npm run bundle

      - name: Create deployment zip
        run: |
          mkdir -p deploy
          rm -f deploy/aquarium-api.zip
          zip -j deploy/aquarium-api.zip lambda/bundle.js

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::681178750909:role/aquarium-github-deploy-role

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name "${LAMBDA_FUNCTION_NAME}" \
            --zip-file fileb://deploy/aquarium-api.zip
          aws lambda wait function-updated --function-name "${LAMBDA_FUNCTION_NAME}"
