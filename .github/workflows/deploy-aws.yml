name: Deploy to AWS (OIDC)

on:
  workflow_dispatch:
    inputs:
      enable_cognito_setup:
        description: "Create/update Cognito, API Gateway authorizer, and Lambda auth config"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_legacy_migration:
        description: "Copy legacy shared readings/profile into Marc's Cognito user namespace"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches: [main]
    paths:
      - "lambda/**"
      - "deploy/**"
      - ".github/workflows/deploy-aws.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-aws-main
  cancel-in-progress: true

env:
  # Opt into Node.js 24 for JS-based GitHub Actions (checkout/setup-node/aws-creds)
  # to avoid the Node 20 deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AWS_REGION: eu-west-1
  LAMBDA_FUNCTION_NAME: aquarium-api
  API_GATEWAY_REST_API_ID: gnewkvhgwd
  API_GATEWAY_STAGE: prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: lambda/package-lock.json

      - name: Install Lambda deps
        working-directory: lambda
        run: npm ci

      - name: Bundle Lambda (bundle.js)
        working-directory: lambda
        run: npm run bundle

      - name: Create deployment zip
        run: |
          mkdir -p deploy
          rm -f deploy/aquarium-api.zip
          zip -j deploy/aquarium-api.zip lambda/bundle.js

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::681178750909:role/aquarium-github-deploy-role

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name "${LAMBDA_FUNCTION_NAME}" \
            --zip-file fileb://deploy/aquarium-api.zip
          aws lambda wait function-updated --function-name "${LAMBDA_FUNCTION_NAME}"

      - name: Configure Cognito auth
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_cognito_setup == 'true' }}
        env:
          MARC_CURRENT_PASSWORD: ${{ secrets.MARC_CURRENT_PASSWORD }}
          REQUESTED_LEGACY_MIGRATION: ${{ inputs.run_legacy_migration }}
        run: |
          if [[ -z "${MARC_CURRENT_PASSWORD}" ]]; then
            echo "Set the MARC_CURRENT_PASSWORD repository secret before configuring Cognito." >&2
            exit 1
          fi
          if [[ "${REQUESTED_LEGACY_MIGRATION}" == "true" ]]; then
            export RUN_LEGACY_MIGRATION=1
          else
            export RUN_LEGACY_MIGRATION=0
          fi
          deploy/setup-cognito-auth.sh

      - name: Disable browser API key requirement
        run: deploy/disable-api-key-requirement.sh

      - name: Configure API Gateway CORS on error responses
        run: deploy/configure-gateway-cors-responses.sh

      - name: Deploy API Gateway stage
        run: |
          aws apigateway create-deployment \
            --rest-api-id "${API_GATEWAY_REST_API_ID}" \
            --stage-name "${API_GATEWAY_STAGE}" \
            --description "GitHub Actions deploy $GITHUB_SHA"

