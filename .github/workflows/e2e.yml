name: E2E

on:
  push:
    branches: [main]
    paths:
      - 'assets/**'
      - 'index.html'
      - 'config.js'
      - 'e2e/**'
      - 'playwright.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'lambda/index.mjs'
      - '.github/workflows/e2e.yml'
  pull_request:
    paths:
      - 'assets/**'
      - 'index.html'
      - 'config.js'
      - 'e2e/**'
      - 'playwright.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'lambda/index.mjs'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - name: Playwright smoke tests
        env:
          WQT_E2E_PASSWORD: ${{ secrets.WQT_E2E_PASSWORD }}
        run: npm run test:e2e
