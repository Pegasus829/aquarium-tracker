name: Lint

on:
  push:
    branches: [main]
    paths:
      - 'assets/**'
      - 'index.html'
      - 'config.js'
      - 'lambda/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - '.prettierrc.json'
      - '.htmlvalidate.json'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - 'assets/**'
      - 'index.html'
      - 'config.js'
      - 'lambda/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - '.prettierrc.json'
      - '.htmlvalidate.json'
      - '.github/workflows/lint.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check
